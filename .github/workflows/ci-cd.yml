name: CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    # ─────────────────────────────────────────────
    # Job 1: Lint & Test — Flask Backend
    # ─────────────────────────────────────────────
    lint-and-test-backend:
        name: Backend (Python/Flask)
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: application/server

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Set up Python
                uses: actions/setup-python@v5
                with:
                    python-version: "3.11"
            
            -   name: Install uv
                uses: astral-sh/setup-uv@v4
                with:
                    version: 'latest'
                    enable-cache: true
            
            -   name: Install dependencies
                run: uv sync --frozen --group dev
            
            -   name: Lint with flake8
                run: |
                    uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
                    uv run flake8 . --count --max-line-length=100 --statistics
            
            -   name: Run tests
                env: 
                    FLASK_ENV: testing
                    HF_TOKEN: ${{secrets.HF_TOKEN}}
                run: uv run pytest --tb=short -q
    

    # ─────────────────────────────────────────────
    # Job 2: Lint & Build — React Frontend
    # ─────────────────────────────────────────────
    lint-and-build-frontend:
        name: Frontend (React / Vite)
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: application/client
        
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
            
            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: "20"
                    cache: npm
                    cache-dependency-path: application/client/package-lock.json
            
            -   name: Install dependencies
                run: npm ci

            -   name: Lint with ESLint
                run: npm run lint
        
            -   name: Build for production
                env:
                    VITE_API_URL: ${{secrets.VITE_API_URL}}
                run: npm run build
            
            -   name: Upload build artifact
                uses: actions/upload-artifact@v4
                with:
                    name: frontend-dist
                    path: application/client/dist
                    retention-days: 7
    

    # ─────────────────────────────────────────────
    # Job 3: Deploy — Render (main branch only)
    # ─────────────────────────────────────────────
    deploy:
        name: Deploy to Render
        runs-on: ubuntu-latest
        needs: [lint-and-test-backend, lint-and-build-frontend]

        # Only deploy on pushes to main (not PRs)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
        steps:
        -   name: Deploy backend to Render
            run: curl --fail "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"
    
        -   name: Deploy frontend to Render
            run: curl --fail "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
    
        -   name: Confirm deployment triggered
            run: echo "HUZZAHHH!!!! Render deploy hooks triggered successfully."
